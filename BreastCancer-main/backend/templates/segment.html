<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Segment | Breast Cancer Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }

        nav {
            background-color: #6200ea;
            padding: 1rem 2rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
            margin: 0;
            padding: 0;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .toggle-mode-btn {
            background-color: transparent;
            border: 2px solid white;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            text-align: center;
        }

        .img-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        img {
            max-width: 300px;
            border-radius: 10px;
            border: 2px solid #ccc;
        }

        #spinner {
            display: none;
            margin-top: 20px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        button {
            margin: 10px;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #6200ea;
            color: white;
        }

        .dark-mode button {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>

<body>
    <nav>
        <h1>Breast Cancer AI</h1>
        <div class="nav-right">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/classify">Classify</a></li>
                <li><a href="/segment">Segment</a></li>
            </ul>
            <button class="toggle-mode-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
        </div>
    </nav>

    <div class="container">
        <h2>Breast Cancer Segmentation</h2>

        <input type="file" id="imageInput" accept="image/*" />
        <button onclick="uploadAndSegment()">Segment Image</button>

        <div id="spinner"></div>
        <p id="segmentation-result"></p>

        <div class="img-container" id="image-preview" style="display: none;">
            <img id="original-img" alt="Original Image" />
            <img id="segmentation-img" alt="Segmentation Result" />
        </div>
        <div id="download-container" style="margin-top: 20px; display: none;">
            <a id="download-link" href="#" download="segmented_image.png">Download Segmented Image</a>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
        }

        async function uploadAndSegment() {
            const imageInput = document.getElementById("imageInput");
            const segmentationResultDiv = document.getElementById("segmentation-result");
            const segmentationImg = document.getElementById("segmentation-img");
            const originalImg = document.getElementById("original-img");
            const imagePreview = document.getElementById("image-preview");
            const spinner = document.getElementById("spinner");
            const downloadContainer = document.getElementById("download-container");
            const downloadLink = document.getElementById("download-link");

            if (imageInput.files.length === 0) {
                alert("Please select an image first.");
                return;
            }

            const file = imageInput.files[0];
            const formData = new FormData();
            formData.append("image", file);

            segmentationResultDiv.textContent = "";
            spinner.style.display = "block";
            imagePreview.style.display = "none";
            downloadContainer.style.display = "none";

            originalImg.src = URL.createObjectURL(file);

            try {
                const response = await fetch("http://localhost:4000/segmentation", {
                    method: "POST",
                    body: formData,
                });

                if (!response.ok) throw new Error("Failed to fetch segmentation image.");

                const contentType = response.headers.get("Content-Type");
                if (!contentType.startsWith("image")) throw new Error("The response is not an image.");

                const imageBlob = await response.blob();
                const imageURL = URL.createObjectURL(imageBlob);

                segmentationImg.src = imageURL;
                downloadLink.href = imageURL;

                segmentationResultDiv.textContent = "Segmentation Complete!";
                imagePreview.style.display = "flex";
                downloadContainer.style.display = "block";
            } catch (error) {
                segmentationResultDiv.textContent = "Error occurred during segmentation.";
                console.error("Segmentation error:", error);
            } finally {
                spinner.style.display = "none";
            }
        }
    </script>
</body>

</html>
